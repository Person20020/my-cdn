name: my-simple-cdn

services:
  web:
    build: ./slack
    volumes:
      - data:/app/data
    # Uncomment if exposed ports are needed
    # ports:
    #   - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  data:
